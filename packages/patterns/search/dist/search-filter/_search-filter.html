





<!-- Mobile show filter button -->
<div class="ds-hide-desktop">
    <button class="ds-btn ds-btn--primary ds-btn--block " id="show_filter_btn" aria-controls="search_filter" aria-expanded="false">
        Filter your results
    </button>
</div>

<div id="search_filter" class="ds-search-filter">
    <div class="ds-search-filter__header">
        <h3 class="ds-search-filter__header-title">Filter</h3>
        <a href="#" class="ds-search-filter__clear-all ds-hide-desktop">Clear all</a>
        <a href="#" id="hide_filter_btn" class="ds-search-filter__close">
            <svg>
                <title>Close</title>
                <use xlink:href="#ds-general-cross" href="#ds-general-cross"></use>
            </svg>
        </a>
    </div>
    
    <div class="ds-search-filter__mobile-filter-update ds-hide-desktop">
        <button id="show_results_btn" class="ds-btn ds-btn--block">Show 80 results</button>
    </div>
    <a href="#" class="ds-search-filter__clear-all ds-hide-mobile">
        <svg>
            <title>Close</title>
            <use xlink:href="#ds-general-cross" href="#ds-general-cross"></use>
        </svg> Clear all filters
    </a>
</div>
